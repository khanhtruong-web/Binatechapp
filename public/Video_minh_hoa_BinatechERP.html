<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Minh Họa Hướng Dẫn Sử Dụng - Binatech ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;850&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-600: #475569;
            --slate-500: #64748b;
            --slate-100: #f1f5f9;
            --slate-50: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--slate-50);
            color: var(--slate-800);
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 2.5rem;
            border-radius: 1.25rem;
            border: 1px solid var(--slate-100);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 850;
            color: var(--slate-900);
            margin-bottom: 1.5rem;
        }

        .logo span {
            color: var(--primary);
        }

        h1 {
            font-size: 1.85rem;
            font-weight: 800;
            color: var(--slate-900);
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--slate-600);
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Video container */
        .video-box {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: var(--slate-900);
            border-radius: 1rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
            border: 1px solid var(--slate-800);
            margin-bottom: 2rem;
            position: relative;
        }

        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 2rem;
        }

        .play-btn {
            width: 4rem;
            height: 4rem;
            background-color: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
            transition: all 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background-color: var(--primary-hover);
        }

        .btn-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 0.75rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: var(--slate-100);
            color: var(--slate-700);
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <span>BinaTech</span> ERP
        </div>
        <h1>Video Hướng Dẫn Sử Dụng & Vận Hành Hệ Thống</h1>
        <p>Xem video mô phỏng các nghiệp vụ cốt lõi trong Binatech ERP: Lập báo giá, phê duyệt Hồ sơ kỹ thuật NDT, kiểm định thiết bị phóng xạ và kết xuất báo cáo Excel qua Chatbox AI.</p>

        <!-- Video box with YouTube or local reference -->
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/OTys9yjVgX4" title="Binatech ERP Walkthrough" allowfullscreen></iframe>
        </div>

        <div class="btn-group">
            <a href="/Huong_dan_su_dung_BinatechERP.html" class="btn btn-secondary">Đọc tài liệu hướng dẫn</a>
            <button onclick="window.close()" class="btn btn-primary">Đóng lại</button>
        </div>
    </div>

</body>
</html>
